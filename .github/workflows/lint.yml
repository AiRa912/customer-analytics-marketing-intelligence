name: Lint

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install nbqa flake8
      - run: nbqa flake8 notebooks/ --max-line-length=100
      - run: flake8 src/ --max-line-length=100
