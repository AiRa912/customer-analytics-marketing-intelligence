name: Notebook execution check

on:
  push:
    branches: [main]

jobs:
  run-notebooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: |
          papermill notebooks/01_eda_and_cleaning.ipynb /dev/null
          papermill notebooks/02_customer_segmentation.ipynb /dev/null
